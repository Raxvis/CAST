name: Validate template

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version fields are synchronized (README, CHANGELOG, plugin.json, SKILL.md)
        run: |
          readme_badge=$(grep -oE 'template-v[0-9]+\.[0-9]+\.[0-9]+' README.md | head -1 | sed 's/template-v//')
          readme_hero=$(grep -oE 'Current template version: `v[0-9]+\.[0-9]+\.[0-9]+`' README.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          changelog=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          plugin=$(grep -oE '"version": "[0-9]+\.[0-9]+\.[0-9]+"' .claude-plugin/plugin.json | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          skill=$(grep -oE 'version: "[0-9]+\.[0-9]+\.[0-9]+"' skills/cast-init/SKILL.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "README badge=$readme_badge hero=$readme_hero CHANGELOG=$changelog plugin.json=$plugin SKILL.md=$skill"
          test -n "$readme_badge"
          test "$readme_badge" = "$readme_hero"
          test "$readme_badge" = "$changelog"
          test "$readme_badge" = "$plugin"
          test "$readme_badge" = "$skill"

      - name: SKILL.md stays under 500 lines
        run: |
          lines=$(wc -l < skills/cast-init/SKILL.md)
          echo "skills/cast-init/SKILL.md: $lines lines"
          test "$lines" -lt 500

      - name: Skill frontmatter name matches directory name
        run: |
          fail=0
          for f in skills/cast-init/SKILL.md skills/cast-init/assets/skills/*/SKILL.md; do
            dir=$(basename "$(dirname "$f")")
            name=$(awk '/^name:/{print $2; exit}' "$f")
            echo "$f: name=$name dir=$dir"
            [ "$name" = "$dir" ] || { echo "MISMATCH in $f"; fail=1; }
          done
          exit $fail

      - name: Agent frontmatter matches the canonical roster
        run: |
          roster=skills/cast-init/references/roster.md
          fail=0
          for f in skills/cast-init/assets/agents/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            name=$(awk '/^name:/{print $2; exit}' "$f")
            desc=$(awk -F'description: ' '/^description:/{print $2; exit}' "$f" | tr -d '"')
            # An empty extraction (e.g. a future `>-` folded description) would make
            # grep -qF "" pass forever — fail loudly instead.
            [ -n "$name" ] || { echo "$f: could not extract frontmatter name"; fail=1; continue; }
            [ -n "$desc" ] || { echo "$f: could not extract a single-line description (folded '>-' style? roster check needs it inline)"; fail=1; continue; }
            # Row-scope to the canonical roster table (rows start "| <n> |") so alias
            # tables don't match, and require the description in the SAME row as the
            # agent's name — swapped descriptions must fail.
            row=$(grep -E '^\| [0-9]+ \|' "$roster" | grep -F "| \`$name\` |" || true)
            [ -n "$row" ] || { echo "$name missing from roster.md's canonical roster table"; fail=1; continue; }
            printf '%s\n' "$row" | grep -qF "$desc" || { echo "$name description drifted from its roster.md row"; fail=1; }
          done
          count=$(ls skills/cast-init/assets/agents/*.md | grep -cv README.md)
          echo "agent files: $count"
          [ "$count" -eq 15 ] || { echo "expected 15 agents, found $count"; fail=1; }
          exit $fail

      - name: Payload READMEs agree with the canonical roster (names, tiers, skills)
        run: |
          # The 1.2.2 stale-routing bug lived in a payload README table, which no
          # check covered. Keep assets/agents/README.md and assets/skills/README.md
          # consistent with references/roster.md — everything is derived at run time
          # and matched on names/tiers (table cells), not prose, so reflow is safe.
          roster=skills/cast-init/references/roster.md
          agents_readme=skills/cast-init/assets/agents/README.md
          skills_readme=skills/cast-init/assets/skills/README.md
          fail=0
          # (1) agents/README.md must list every agent with a tier that appears in
          #     roster.md's Tier column for that agent (roster may list several,
          #     e.g. "2 / 4"; the README shows the primary as "T2").
          for f in skills/cast-init/assets/agents/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            name=$(basename "$f" .md)
            row=$(grep -F "| \`$name.md\` |" "$agents_readme" || true)
            [ -n "$row" ] || { echo "$name.md has no roster row in $agents_readme"; fail=1; continue; }
            tier=$(printf '%s\n' "$row" | awk -F'|' '{gsub(/[ T]/,"",$4); print $4; exit}')
            [ -n "$tier" ] || { echo "$name row in $agents_readme has an empty Tier cell"; fail=1; continue; }
            roster_tiers=$(grep -E '^\| [0-9]+ \|' "$roster" | grep -F "| \`$name\` |" | awk -F'|' '{gsub(/ /,"",$4); print $4; exit}')
            [ -n "$roster_tiers" ] || { echo "$name missing from $roster roster table"; fail=1; continue; }
            case "/$roster_tiers/" in
              *"/$tier/"*) ;;
              *) echo "$name: tier T$tier in $agents_readme not among roster.md tiers '$roster_tiers'"; fail=1 ;;
            esac
          done
          # (2) skills/README.md's pipeline table must have a row for each shipped
          #     pipeline skill, naming both the directory and the /skill invocation.
          for d in skills/cast-init/assets/skills/*/; do
            s=$(basename "$d")
            grep -E '^\|' "$skills_readme" | grep -F "\`$s/\`" | grep -qF "/$s" \
              || { echo "$skills_readme pipeline table has no row naming $s/ and /$s"; fail=1; }
          done
          [ "$fail" -eq 0 ] && echo "payload READMEs agree with the roster"
          exit $fail

      - name: Payload and example contain no pre-1.0 references
        run: |
          hits=$(grep -rln 'PROMPT\.md\|\.claude/commands\|slash command' \
            skills/cast-init/assets/ example/ || true)
          if [ -n "$hits" ]; then
            echo "Stale pre-1.0 references found in:"; echo "$hits"; exit 1
          fi
          echo "clean"

      - name: Plugin manifests are valid JSON (fast pre-check)
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8')); console.log('plugin.json ok')"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8')); console.log('marketplace.json ok')"

      - name: Plugin manifests pass the real validator (claude plugin validate)
        run: |
          # Pinned to the version verified locally (claude --version). Bump this
          # deliberately — an unpinned install lets a bad upstream release break CI
          # for unrelated changes, and this is the slowest step in the job.
          npm install -g @anthropic-ai/claude-code@2.1.207
          claude plugin validate .

      - name: Every README placeholder-table token exists in the payload
        run: |
          # Each token documented in README's "Full placeholder reference" table must
          # appear somewhere under skills/cast-init/assets/, or the table is documenting
          # a substitution target that no longer exists (the v1.2.x dead-token bug).
          # Allowlist: tokens that are deliberate exceptions.
          #   CAST_VERSION — stamped into the installed CLAUDE.md by /cast-init from its
          #   own version at install time; allowlisted so the check stays green even if
          #   the payload carries it only transiently.
          allow="CAST_VERSION"
          fail=0
          for tok in $(grep -oE '\| `\[[A-Z][A-Z0-9_]*\]`' README.md | grep -oE '[A-Z][A-Z0-9_]*'); do
            case " $allow " in *" $tok "*) continue ;; esac
            grep -rqF "[$tok]" skills/cast-init/assets/ || { echo "README table documents [$tok] but it appears nowhere in the payload"; fail=1; }
          done
          [ "$fail" -eq 0 ] && echo "all README-table tokens are live"
          exit $fail

      - name: Every payload token is documented in README's table (reverse token lint)
        run: |
          # Reverse direction of the check above: every [UPPER_SNAKE] token in the
          # payload must appear in README's placeholder table, UNLESS it is a per-use
          # sub-template token — one an agent fills in each time a form or skeleton
          # is used (bug reports, milestone forms, doc skeletons like PRD/GLOSSARY),
          # rather than a stable project fact /cast-init substitutes at install time.
          # The allowlist below is that per-use set. When this check flags a new
          # token, decide which it is: stable project fact -> add a row to README's
          # placeholder table; per-use fill-in -> add it here (keep sorted).
          # Regenerate the candidate list with:
          #   comm -23 <(grep -rhoE '\[[A-Z][A-Z0-9_]+\]' skills/cast-init/assets/ | tr -d '[]' | sort -u) \
          #            <(grep -oE '\| `\[[A-Z][A-Z0-9_]*\]`' README.md | grep -oE '[A-Z][A-Z0-9_]*' | sort -u)
          allow="
            ABBR_1 ABBR_2 ABBR_3 ABBR_4 ABBR_5 ACCESSIBILITY_STANDARD ACTION ACTION_1 ACTION_2
            ACTION_OR_RULE_CHANGE ACTUAL_APPROACH ACTUAL_DURATION AGENT ANDROID ANY_TYPE ASSET_CATEGORY
            ASSET_NAME AUDIT_DATE AUTHOR BENEFIT BUSINESS_OUTCOME CAST CHANGE_SUMMARY CHECK_1 CHECK_2
            CHECK_3 CHECK_NAME_1 CHECK_NAME_2 CHECK_NAME_3 COLOR_CONSTANT COMMAND COMPONENT_CATEGORY
            COMPONENT_NAME_1 COMPONENT_NAME_2 COMPONENT_NAME_3 COMPONENT_OR_SCREEN_NAME COMPONENT_PATH
            CONCEPT_TITLE CONSTANT CONSTANT_NAME CORRECT_BEHAVIOR COST COVERAGE_OUTPUT_DIRECTORY
            CRASH_REPORTER CURRENT_VERSION CUSTOM_METRIC DATE DECIMAL_PLACES DECISION_TITLE DEFAULT
            DEFAULT_SAVE_FUNCTION DEFAULT_VALUE DESCRIPTION DETAIL DIFFERENCE_AND_REASON_IF_SIGNIFICANT
            DOC_REFERENCE DOMAIN_NOT_FOUND DOMAIN_SPECIFIC DURATION ELEMENT EPSILON ESTIMATED_EFFORT
            EXAMPLE_CONSTANT
            EXAMPLE_MODULE_NAME EXPECTED_ERROR_MESSAGE FAMILY FEATURE_AREA FEATURE_AREA_1
            FEATURE_AREA_2 FEATURE_NAME FEATURE_OR_AREA_1 FEATURE_OR_AREA_2 FIELD_NAME FILE_1 FILE_2
            FILE_PATTERN FILTER_FLAG FINAL_STATE FIXED_TIMESTAMP FORMAT FULL_TERM_1 FULL_TERM_2
            FULL_TERM_3 FULL_TERM_4 FULL_TERM_5 HEADER_HEIGHT HEX HOME HOOK_CATEGORY HOOK_PATH
            HOW_MEASURED ID_TYPE INCORRECT_BEHAVIOR INITIAL_STATE INVALID_CONDITION IOS ISSUE_1 ISSUE_2
            ITEM_1 ITEM_2 ITEM_3 ITEM_TITLE KEY_BEHAVIOR KEY_DIFFERENTIATOR LEVEL LIMIT
            LIST_AGENTS_ACTIVE_THIS_MILESTONE LIST_KEY_BEHAVIORS_TESTED LIST_TESTS M1_NAME M2_NAME
            M3_NAME M4_NAME M5_NAME MAX_RETRY_COUNT MEASURABLE_BEHAVIOR MEMBER METRIC_1 METRIC_2
            MILESTONE_1 MILESTONE_2 MILESTONE_3 MILESTONE_NAME MILESTONE_OR_DATE MIN_ANDROID_VERSION
            MIN_IOS_VERSION MINIMUM_SPEC_DEVICE MISSING_INPUT_CONDITION MOBILE_FRAMEWORK MODULE
            MODULE_1 MODULE_2 MODULE_3 MODULE_4 MODULE_5 MODULE_A MODULE_B MODULE_C MODULE_CONSTANT
            MODULE_NAME NAME NOTE NOTES OPERATION_NAME OS_LIST OTHER_TERM PARTICIPANT_ROLES
            PATH_OR_NONE PATH_TO_ARCH_DOC PATH_TO_MILESTONE_DOC PATH_TO_TASKS_DOC
            PERFORMANCE_METRIC PERSISTENCE PERSISTENCE_MODULE_PATH PILLAR_1 PILLAR_2 PILLAR_3
            PLACEHOLDER PLATFORM PLATFORM_A PLATFORM_B POST_LAUNCH_ITEM_1
            POST_LAUNCH_ITEM_2 POST_LAUNCH_ITEM_3 POST_LAUNCH_ITEM_4 PRIMARY_USER_SEGMENT PRINCIPLE_1
            PRINCIPLE_2 PRINCIPLE_3 PRODUCT_TYPE PURE_LOGIC_CATEGORY PURE_LOGIC_PATH QUESTION RATE
            REASON REQUIREMENTS_REFERENCE RETRY_DELAY REVENUE ROOT_CAUSE ROUTES ROUTES_FILE
            SAFE_DEFAULT_VALUE SCHEMA SCHEMA_NAME SCREEN SCREEN_NAME SCREEN_OR_COMPONENT_NAME SIZE
            SOLUTION_DESCRIPTION SOURCE_ROOT SPACING_CONSTANT SPACING_UNIT SPEC_NAME_OR_LINK
            SPEC_SECTION SPECIFIED_APPROACH STATE_A STATE_B STATE_C STATE_LAYER STATE_STORE_CATEGORY
            STATUS_TYPE STORAGE_KEY STORE_PATH SUPPORTING_TYPE SYSTEM SYSTEM_NAME TARGET
            TARGET_PLATFORM_LIST TASK_NAME TASK_OR_ISSUE_NAME TASK_REFERENCE TERM TERM_NAME
            TEST_DESCRIPTION_PATTERN TEST_DIRECTORY TEST_FILE_EXTENSION TEST_ROOT TEST_WATCH_CMD
            THEME_FILE THEME_KEY TIME TIMEOUT_MS TYPE UNKNOWN_TYPE USE_LOOP_HOOK USER_NEED USER_TYPE
            UTILITY_CATEGORY UTILITY_PATH VALIDATOR VALUE VALUE_A VALUE_B VALUE_C VERSION VERSION_1
            VERSION_2 VERSION_OR_MILESTONE VERSIONING_SCHEME WEB WEIGHT
          "
          allow_flat=" $(printf '%s' "$allow" | tr '\n' ' ') "
          fail=0
          for tok in $(grep -rhoE '\[[A-Z][A-Z0-9_]+\]' skills/cast-init/assets/ | tr -d '[]' | sort -u); do
            grep -qF "| \`[$tok]\`" README.md && continue
            case "$allow_flat" in *" $tok "*) continue ;; esac
            echo "payload token [$tok] is neither in README's placeholder table nor the per-use allowlist"
            fail=1
          done
          [ "$fail" -eq 0 ] && echo "reverse token lint clean"
          exit $fail

      - name: Example fixture contains no placeholder tokens
        run: |
          # README sells example/ as a fully substituted instance — no [UPPER_SNAKE]
          # tokens may remain. Allowlist (extended regex, matched against "file:line:token")
          # exists for legitimate literal mentions; currently nothing is allowlisted.
          allow_re='^$'
          hits=$(grep -rnoE '\[[A-Z][A-Z0-9_]+\]' example/ | grep -vE "$allow_re" || true)
          if [ -n "$hits" ]; then
            echo "Placeholder tokens found in example/:"; echo "$hits"; exit 1
          fi
          echo "clean"

      - name: docs/templates/artifacts path-split lint
        run: |
          # Hard rule: templates are only ever referenced under templates/, and work
          # instances only ever under artifacts/. Both sub-checks derive their inputs
          # from the payload at run time.
          fail=0
          # (1) No payload file may reference a template basename under docs/ or artifacts/.
          for t in skills/cast-init/assets/templates/*.md; do
            b=$(basename "$t"); [ "$b" = "README.md" ] && continue
            hits=$(grep -rnE "(docs|artifacts)/$b" skills/cast-init/assets/ || true)
            if [ -n "$hits" ]; then
              echo "Template basename referenced under docs/ or artifacts/:"; echo "$hits"; fail=1
            fi
          done
          # (2) No instance-pattern path may appear under docs/ or templates/.
          hits=$(grep -rnE '(docs|templates)/[A-Za-z0-9_{}./-]*(milestone-|ceo-review-|ux-review-|retrospective-)' skills/cast-init/assets/ || true)
          if [ -n "$hits" ]; then
            echo "Instance-pattern path under docs/ or templates/:"; echo "$hits"; fail=1
          fi
          [ "$fail" -eq 0 ] && echo "path split clean"
          exit $fail

      - name: Relative markdown links resolve (README, TROUBLESHOOTING, example README)
        run: |
          fail=0
          for f in README.md TROUBLESHOOTING.md example/README.md; do
            dir=$(dirname "$f")
            while IFS= read -r target; do
              target=${target%%#*}
              [ -z "$target" ] && continue
              case "$target" in http://*|https://*|mailto:*) continue ;; esac
              [ -e "$dir/$target" ] || { echo "broken link in $f -> $target"; fail=1; }
            done < <(grep -oE '\]\([^)]+\)' "$f" | sed -E 's/^\]\(//; s/\)$//')
          done
          [ "$fail" -eq 0 ] && echo "all relative links resolve"
          exit $fail

      - name: Example instances carry their template's required level-2 headings
        run: |
          # Instance→template pairs are DERIVED from example/artifacts/** filename
          # patterns at run time: every fixture artifact must match a known pattern
          # (unrecognized files fail loudly, so new example files can't dodge the
          # check), and each matched instance must contain every "## X (required)"
          # heading of its template (marker suffix stripped; extra sections fine).
          fail=0
          check_headings() {
            inst=$1; tmpl="skills/cast-init/assets/templates/$2"
            if [ ! -f "$tmpl" ]; then echo "missing template: $tmpl (needed by $inst)"; fail=1; return; fi
            while IFS= read -r req; do
              grep -qxF "$req" "$inst" || { echo "$inst is missing required section: '$req' (from $2)"; fail=1; }
            done < <(grep -E '^## .*\(required\)' "$tmpl" | sed 's/ (required)$//')
          }
          while IFS= read -r f; do
            case "$(basename "$f")" in
              AGENT_STATE.md|BUGS.md|STANDUP.md) ;;  # seed instances, covered by their own checks
              milestone-*-tasks.md)      check_headings "$f" MILESTONE_TASKS.md ;;
              milestone-*-completion.md) check_headings "$f" MILESTONE_COMPLETION.md ;;
              milestone-*-validation.md) check_headings "$f" MILESTONE_VALIDATION.md ;;
              arch-milestone-*.md)       check_headings "$f" ARCH_SYSTEM.md ;;
              ui-milestone-*.md)         check_headings "$f" UI_SPEC.md ;;
              ceo-review-*.md)           check_headings "$f" CEO_REVIEW.md ;;
              ux-review-*.md)            check_headings "$f" UX_REVIEW.md ;;
              retrospective-*.md)        check_headings "$f" MILESTONE_RETROSPECTIVE.md ;;
              security-review-*.md|performance-review-*.md) ;;  # planning reviews carry no template contract
              milestone-*.md)            check_headings "$f" MILESTONE_DEFINITION.md ;;
              *) echo "unrecognized example artifact: $f — add a filename pattern here or fix the filename"; fail=1 ;;
            esac
          done < <(find example/artifacts -type f -name '*.md' | sort)
          # Completeness: a milestone with a completion record must also carry its
          # validation record and retrospective, and — when UI-flagged (a UI spec
          # exists for it) — a UX review. All derived from the files present.
          for c in example/artifacts/milestones/*-completion.md; do
            [ -e "$c" ] || continue
            stem=${c%-completion.md}
            n=$(basename "$stem" | sed -E 's/^milestone-([0-9]+).*/\1/')
            [ -f "${stem}-validation.md" ] || { echo "completed milestone lacks its validation record: ${stem}-validation.md"; fail=1; }
            [ -f "example/artifacts/reviews/retrospective-milestone-$n.md" ] || { echo "completed milestone lacks its retrospective: example/artifacts/reviews/retrospective-milestone-$n.md"; fail=1; }
            if [ -f "example/artifacts/ui-specs/ui-milestone-$n.md" ]; then
              [ -f "example/artifacts/reviews/ux-review-milestone-$n.md" ] || { echo "UI-flagged completed milestone lacks its UX review: example/artifacts/reviews/ux-review-milestone-$n.md"; fail=1; }
            fi
          done
          [ "$fail" -eq 0 ] && echo "all example instances match their template contracts"
          exit $fail

      - name: All agent files carry the identical model pin
        run: |
          fail=0
          pins=""
          for f in skills/cast-init/assets/agents/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            pin=$(awk '/^model:/{print $2; exit}' "$f")
            [ -n "$pin" ] || { echo "$f: no model: frontmatter line"; fail=1; continue; }
            pins="$pins$pin"$'\n'
          done
          distinct=$(printf '%s' "$pins" | sort -u)
          count=$(printf '%s\n' "$distinct" | grep -c .)
          echo "model pins found: $distinct ($count distinct)"
          [ "$count" -eq 1 ] || { echo "agent model pins are not identical"; fail=1; }
          exit $fail

      - name: No stale pipeline-routing orders (docs/PIPELINE_LOOP.md is canonical)
        run: |
          # Since 1.2.0: Defects route Bug Gatherer -> Product -> Debugger, and the Issue
          # loop is Refactor -> Tester -> Reviewer. Any prose stating the old adjacencies
          # (Debugger -> Bug Gatherer, or Refactor directly -> Reviewer) is drift.
          # CHANGELOG.md is excluded: its historical entries describe the old behavior.
          hits=$(grep -rnE 'Debugger(\*\*)? *(→|↔|->) *(\*\*)? *Bug Gatherer|Refactor(\*\*)? *(→|↔|->) *(\*\*)? *Reviewer' \
            README.md CLAUDE.md TROUBLESHOOTING.md skills/ example/ || true)
          if [ -n "$hits" ]; then
            echo "Stale routing found (canonical: Defects = Bug Gatherer → Product → Debugger; Issues = Refactor → Tester → Reviewer):"
            echo "$hits"; exit 1
          fi
          echo "clean"

      - name: Template level-2 headings carry (required)/(optional) markers
        run: |
          # Since 1.2.0 every template section states its contract. Level-3 headings are
          # exempt (repeatable per-instance blocks like task or module entries), as is the
          # "## Task Template" sub-skeleton in MILESTONE_TASKS.md.
          fail=0
          for f in skills/cast-init/assets/templates/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            while IFS= read -r h; do
              [ "$h" = "## Task Template" ] && continue
              echo "$h" | grep -qE '\((required|optional)\)' || { echo "UNMARKED [$f]: $h"; fail=1; }
            done < <(grep -E '^## ' "$f")
          done
          [ "$fail" -eq 0 ] && echo "all marked"
          exit $fail

      - name: BUGS.md carries the canonical bug lifecycle (payload and example)
        run: |
          flow='New → Triaged → In Progress → Fixed → Verified → Closed'
          for f in skills/cast-init/assets/artifacts/BUGS.md example/artifacts/BUGS.md; do
            grep -qF "$flow" "$f" || { echo "$f: missing canonical status flow"; exit 1; }
            grep -qF 'Field ownership' "$f" || { echo "$f: missing field-ownership table"; exit 1; }
          done
          stale=$(grep -n '\*\*Status\*\*: Open' example/artifacts/BUGS.md || true)
          if [ -n "$stale" ]; then
            echo "example BUGS.md uses pre-1.2 status vocabulary:"; echo "$stale"; exit 1
          fi
          echo "clean"

      - name: Example fixture includes the 1.2 state files
        run: |
          test -f skills/cast-init/assets/artifacts/AGENT_STATE.md
          test -f skills/cast-init/assets/docs/PIPELINE_LOOP.md
          test -f example/artifacts/AGENT_STATE.md
          echo "present"

      - name: README File Listing counts match the payload
        run: |
          docs_actual=$(ls skills/cast-init/assets/docs/*.md | wc -l | tr -d ' ')
          docs_claim=$(grep -oE '### docs/ \(reference material, [0-9]+ files\)' README.md | grep -oE '[0-9]+')
          tmpl_actual=$(ls skills/cast-init/assets/templates/*.md | grep -cv README.md)
          tmpl_claim=$(grep -oE '### templates/ \(document templates, [0-9]+ files\)' README.md | grep -oE '[0-9]+')
          echo "docs: claim=$docs_claim actual=$docs_actual; templates: claim=$tmpl_claim actual=$tmpl_actual"
          test -n "$docs_claim" && test "$docs_claim" = "$docs_actual"
          test -n "$tmpl_claim" && test "$tmpl_claim" = "$tmpl_actual"
